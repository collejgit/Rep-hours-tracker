services:
  - type: web
    name: colletti-coastal
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: APP_PASSWORD
        sync: false
      - key: DB_PATH
        value: /opt/render/project/data/rep_hours.db
      - key: UPLOAD_DIR
        value: /opt/render/project/data/uploads
    disk:
      name: colletti-data
      mountPath: /opt/render/project/data
      sizeGB: 1
